name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
      - run: cd tools/crawler && npm ci
      - run: npx prettier --check "**/*.{js,mjs,json,yml,yaml,md}"
      - run: node --check tools/crawler/crawl.js
      - run: node --check tools/crawler/monkey.js
      - run: node --check scripts/baseline-diff.mjs
      - run: node --check scripts/run-authz-matrix.mjs
      - run: node --check scripts/auth-playwright.mjs
      - run: node --check scripts/mechanical-checks.mjs
      - run: node --check scripts/aggregate-gate.mjs
      - run: bash -n scripts/auth.sh scripts/run-all.sh scripts/run-schemathesis.sh scripts/run-zap.sh scripts/run-observatory.sh

  self-test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./
        with:
          url: https://example.com
          crawler-seed-pages: "/"
          crawler-max-pages: "3"
          crawler-wait-ms: "500"
          baseline-enabled: "true"
          observatory-enabled: "true"
          observatory-fail-grade: "F"
          monkey-enabled: "true"
          monkey-duration-ms: "15000"
          monkey-seed: "1337"

  image:
    runs-on: ubuntu-latest
    needs: lint
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v3.11.1
      - name: Log in to ghcr.io
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@902fa8ec7d6ecbf8d84d538b9b233a880e428804 # v5.7.0
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,prefix=main-,format=long,enable={{is_default_branch}}
            type=raw,value=latest,enable={{is_default_branch}}
      - name: Build (and push on main)
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
        with:
          context: .
          platforms: linux/amd64
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
