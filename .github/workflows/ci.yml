name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
      - run: cd tools/crawler && npm ci
      - run: npx prettier --check "**/*.{js,mjs,json,yml,yaml,md}"
      - run: node --check tools/crawler/crawl.js
      - run: node --check tools/crawler/monkey.js
      - run: node --check scripts/baseline-diff.mjs
      - run: node --check scripts/run-authz-matrix.mjs
      - run: node --check scripts/auth-playwright.mjs
      - run: node --check scripts/mechanical-checks.mjs
      - run: node --check scripts/aggregate-gate.mjs
      - run: node --check lib/finding-schema.mjs
      - run: node --check scripts/normalize-findings.mjs
      - run: node --check scripts/generate-qa-report.mjs
      - run: node --check scripts/selftest.mjs
      - run: bash -n scripts/auth.sh scripts/run-all.sh scripts/run-schemathesis.sh scripts/run-zap.sh scripts/run-observatory.sh
      - run: node scripts/selftest.mjs

  self-test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./
        with:
          url: https://example.com
          crawler-seed-pages: "/"
          crawler-max-pages: "3"
          crawler-wait-ms: "500"
          baseline-enabled: "true"
          observatory-enabled: "true"
          observatory-fail-grade: "F"
          monkey-enabled: "true"
          monkey-duration-ms: "15000"
          monkey-seed: "1337"

  image:
    runs-on: ubuntu-latest
    needs: lint
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0
      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
      - name: Log in to ghcr.io
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@c99871dec2022cc055c062a10cc1a1310835ceb4 # v4.3.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,prefix=main-,format=long,enable={{is_default_branch}}
            type=raw,value=latest,enable={{is_default_branch}}
      - name: Build (and push on main)
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
