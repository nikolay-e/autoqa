name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: cd tools/crawler && npm ci
      - run: npx prettier --check "**/*.{js,json,yml,yaml,md}"

  self-test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: ./
        with:
          url: https://nikolay-eremeev.com
          crawler-seed-pages: '/,/ru'
          crawler-max-pages: '5'
          crawler-wait-ms: '1000'
          crawler-fail-on-violations: 'false'
