name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "22"
      - run: cd tools/crawler && npm ci
      # Guard against stray NUL/control bytes in source (a NUL in warehouse.mjs
      # made git treat it as binary and blinded diff review). prettier does not
      # catch this — a control byte inside a string passes formatting.
      - name: No control bytes in source
        run: |
          if grep -rlP '[\x00-\x08\x0e-\x1f]' --include='*.mjs' --include='*.js' --include='*.sh' --exclude-dir=node_modules scripts lib tools; then
            echo "control byte(s) found in source — see files above"; exit 1
          fi
      - run: npx prettier --check "**/*.{js,mjs,json,yml,yaml,md}"
      - run: node --check tools/crawler/crawl.js
      - run: node --check tools/crawler/monkey.js
      - run: node --check tools/crawler/redact.js
      - run: node --check scripts/baseline-diff.mjs
      - run: node --check scripts/run-authz-matrix.mjs
      - run: node --check scripts/auth-playwright.mjs
      - run: node --check scripts/mechanical-checks.mjs
      - run: node --check scripts/aggregate-gate.mjs
      - run: node --check lib/finding-schema.mjs
      - run: node --check lib/gate-rules.mjs
      - run: node --check scripts/warehouse.mjs
      - run: node --check scripts/redact-events.mjs
      - run: node --check scripts/normalize-findings.mjs
      - run: node --check scripts/generate-qa-report.mjs
      - run: node --check scripts/selftest.mjs
      - run: node --check scripts/selftest-http-basic.mjs
      - run: node --check scripts/selftest-off-origin.mjs
      - run: bash -n scripts/auth.sh scripts/run-all.sh scripts/run-schemathesis.sh scripts/run-zap.sh scripts/run-observatory.sh
      - run: node scripts/selftest.mjs

  self-test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: ./
        with:
          url: https://example.com
          crawler-seed-pages: "/"
          crawler-max-pages: "3"
          crawler-wait-ms: "500"
          baseline-enabled: "true"
          observatory-enabled: "true"
          observatory-fail-grade: "F"
          monkey-enabled: "true"
          monkey-duration-ms: "15000"
          monkey-seed: "1337"
      - name: Self-test HTTP Basic Auth (crawler httpCredentials)
        run: node scripts/selftest-http-basic.mjs
      - name: Self-test crawler origin boundary (issue 27)
        run: node scripts/selftest-off-origin.mjs

  image:
    runs-on: ubuntu-latest
    needs: lint
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - name: Log in to ghcr.io
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,prefix=main-,format=long,enable={{is_default_branch}}
            type=raw,value=latest,enable={{is_default_branch}}
      - name: Build (and push on main)
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
