name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
      - run: cd tools/crawler && npm ci
      - run: npx prettier --check "**/*.{js,mjs,json,yml,yaml,md}"
      - run: node --check tools/crawler/crawl.js
      - run: node --check scripts/baseline-diff.mjs
      - run: node --check scripts/run-authz-matrix.mjs
      - run: node --check scripts/auth-playwright.mjs
      - run: node --check scripts/mechanical-checks.mjs
      - run: node --check scripts/aggregate-gate.mjs
      - run: bash -n scripts/auth.sh scripts/run-schemathesis.sh scripts/run-zap.sh scripts/run-observatory.sh

  self-test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./
        with:
          url: https://example.com
          crawler-seed-pages: "/"
          crawler-max-pages: "3"
          crawler-wait-ms: "500"
          baseline-enabled: "true"
          observatory-enabled: "true"
          observatory-fail-grade: "F"
