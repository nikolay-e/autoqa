name: "AutoQA"
description: "Automated post-deploy QA: Playwright crawler + axe accessibility + Schemathesis API fuzzing + OWASP ZAP security scan + Mozilla Observatory + visual regression + AuthZ matrix + baseline diff"
branding:
  icon: "shield"
  color: "green"

inputs:
  url:
    description: "Base production URL"
    required: true
  auth-url:
    description: "API auth endpoint path for Bearer token (e.g., /api/Users/AuthenticateByName)"
    default: ""
  auth-body:
    description: "JSON body for auth request"
    default: ""
  auth-mode:
    description: "How to acquire the auth token. 'curl' (default): POST to auth-url with auth-body. 'playwright': render auth-login-page in a real browser (set to bypass Cloudflare/Akamai bot challenges that filter curl)."
    default: "curl"
  auth-login-page:
    description: "Login page path used when auth-mode=playwright (e.g., /login). Falls back to crawler-login-url if empty."
    default: ""
  http-basic-username:
    description: "Username for proxy-level HTTP Basic Auth (e.g., Traefik basicAuth middleware in front of the whole site). Applies to crawler + monkey (Playwright httpCredentials) and Schemathesis (Authorization: Basic; a Bearer token from auth-url wins when both are set — one Authorization header). Not supported for Observatory (scans from Mozilla's servers) or ZAP. Empty = off. Ref: issue #26."
    default: ""
  http-basic-password:
    description: "Password for proxy-level HTTP Basic Auth (set as a secret in the downstream workflow)."
    default: ""

  crawler-enabled:
    description: "Run Playwright crawler"
    default: "true"
  crawler-username:
    description: "Form login username (empty = skip form login)"
    default: ""
  crawler-password:
    description: "Form login password"
    default: ""
  crawler-login-url:
    description: "Login page path"
    default: "/login"
  crawler-login-selector-username:
    description: "CSS selector for username input"
    default: 'input[type="text"], input[type="email"]'
  crawler-login-selector-password:
    description: "CSS selector for password input"
    default: 'input[type="password"]'
  crawler-login-selector-submit:
    description: "CSS selector for submit button"
    default: 'button[type="submit"], button'
  crawler-seed-pages:
    description: "Comma-separated seed paths to start crawling from"
    default: "/"
  crawler-max-pages:
    description: "Maximum pages to crawl"
    default: "50"
  crawler-wait-ms:
    description: "Wait time between pages in milliseconds"
    default: "2000"
  crawler-exclude-urls:
    description: "Comma-separated URL patterns to ignore in error reporting"
    default: ""
  crawler-console-ignore:
    description: "Comma-separated substrings matched against console message text or source script URL; matching messages are dropped from error reporting (third-party noise such as CDN bot-challenge probes)"
    default: ""
  crawler-decorative-paths:
    description: "Comma-separated URL substrings (e.g. /Images/) for optional decorative resources. 4xx network errors / broken links whose URL matches are downgraded by the final gate from a blocking finding to non-blocking info — for assets that are legitimately absent (404 is the correct API answer and the UI renders a placeholder) and whose per-item ids keep them from settling into the baseline. Empty = off."
    default: ""
  crawler-fail-on-violations:
    description: "Fail the composite action when the crawler reports violations (broken links, JS errors, critical axe, CSP, mixed content, network errors). Honored by the final gate step. Ignored when baseline-enabled=true (baseline diff governs instead)."
    default: "true"

  baseline-enabled:
    description: "Diff crawler findings against cached baseline; fail PRs only on NEW findings (push to main updates baseline)"
    default: "true"
  baseline-fail-on-new:
    description: "Make NEW crawler findings blocking even on push to main/master. The baseline still updates in the same run, so a regression fails exactly one run and is absorbed for the next (alarm-once). For consumers whose only autoqa runs are post-deploy on main — without this the baseline gate can never block there. First run with no cached baseline never blocks."
    default: "false"

  mechanical-fail-on-violations:
    description: "Fail the composite action when Phase 1.5 mechanical checks (M1–M6) report any P0 finding. P1 findings are always informational. Default off because mechanical checks are advisory."
    default: "false"

  schemathesis-enabled:
    description: "Run Schemathesis API fuzzing"
    default: "false"
  schemathesis-fail-on-violations:
    description: "Fail the composite action when Schemathesis reports failed/errored cases."
    default: "true"
  openapi-url:
    description: "OpenAPI spec path (e.g., /api/openapi.json)"
    default: ""
  schemathesis-base-url:
    description: "Override Schemathesis --url (defaults to `url`). Use when the API mounts under a path prefix that differs from the crawler entry, e.g., the PWA serves `/` and the backend is at `/api/*` — set this to `https://host/api` so Schemathesis hits the backend, not the SPA shell."
    default: ""
  schemathesis-exclude-paths:
    description: "Comma-separated API paths to exclude from fuzzing"
    default: ""
  schemathesis-exclude-checks:
    description: "Comma-separated Schemathesis checks to exclude"
    default: "ignored_auth,unsupported_method"

  zap-enabled:
    description: "Run OWASP ZAP security scan"
    default: "false"
  zap-fail-on-violations:
    description: "Fail the composite action when ZAP reports HIGH-risk alerts."
    default: "true"
  zap-rate-limited-paths:
    description: "Comma-separated URL substrings for endpoints fronted by a rate limiter / auth gate (e.g. /api/auth/login). A HIGH ZAP alert (typically boolean-based SQLi) on such a path is a false positive — the differential ZAP measured is the limiter's 429/403, not a DB-level injection; the attack never reached the database. The traditional -J report carries no per-instance HTTP status, so the gate cannot see the 429 directly; instead a HIGH alert is downgraded by the final gate from blocking to non-blocking info only when EVERY one of its instances targets a declared path (an alert that also fires on an un-gated path still blocks). Empty = off. Ref: issue #7."
    default: ""

  observatory-enabled:
    description: "Run MDN HTTP Observatory security-headers scan"
    default: "false"
  observatory-fail-grade:
    description: "Fail if Observatory grade is worse than this (A+ A A- B+ B B- C+ C C- D+ D D- F)"
    default: "B"
  observatory-fail-on-violations:
    description: "Fail the composite action when Observatory grade is worse than observatory-fail-grade."
    default: "true"

  argos-enabled:
    description: "Capture screenshots at 1440x900 and 375x667 viewports and upload to Argos for visual regression"
    default: "false"
  argos-token:
    description: "Argos CI repository token (set as a secret in the downstream workflow)"
    default: ""

  authz-enabled:
    description: "Run AuthZ two-token matrix (BOLA / OWASP API1:2023) against resource paths owned by user A"
    default: "false"
  authz-user-a-body:
    description: "JSON body for user A login (sent to auth-url)"
    default: ""
  authz-user-b-body:
    description: "JSON body for user B login (sent to auth-url)"
    default: ""
  authz-resource-paths:
    description: "Comma-separated resource paths owned by user A (e.g., /api/notes/1,/api/notes/2). For each: user A must get 2xx, user B must get 401/403/404, no-auth must get 401/403/404."
    default: ""
  authz-fail-on-violations:
    description: "Fail the composite action when the AuthZ matrix reports BOLA / auth-bypass."
    default: "true"

  monkey-enabled:
    description: "Run the monkey / chaos UI tester — seeded random Playwright interactions (clicks, fuzz input, keys, navigation) for a time budget, hunting crashes, uncaught JS errors and 5xx responses. Opt-in. Reuses crawler-username/password/login selectors to log in first."
    default: "false"
  monkey-duration-ms:
    description: "Monkey time budget in milliseconds (default 300000 = 5 minutes). A hard-kill backstop fires 30s after this."
    default: "300000"
  monkey-seed:
    description: "Seed for the monkey's PRNG. Same seed + same app replays the same action sequence; the seed is logged in the report so a crash can be reproduced."
    default: "1337"
  monkey-seed-pages:
    description: "Comma-separated paths the monkey starts from and resets to when it gets stuck (default '/')."
    default: "/"
  monkey-avoid-text:
    description: "Comma-separated lowercased text / aria-label substrings the monkey will NOT click, so it does not log itself out or delete data and end the session early. Set empty to allow destructive controls."
    default: "logout,log out,sign out,signout,delete account,deactivate,remove account"
  monkey-exclude-urls:
    description: "Comma-separated URL substrings to ignore in monkey error reporting (third-party noise)."
    default: ""
  monkey-console-ignore:
    description: "Comma-separated substrings matched against monkey console-error text or source script URL; matching messages are dropped from error reporting. Falls back to crawler-console-ignore when empty."
    default: ""
  monkey-fail-on-violations:
    description: "Fail the composite action when the monkey finds a serious issue (crash / uncaught JS error / 5xx). Default off — the monkey is advisory because exploration is inherently variable; console errors and failed requests are always non-blocking info."
    default: "false"

  extra-findings-path:
    description: "Path to a JSON array of custom StandardFindings (fingerprint/severity/category/tool/title/url/…) from your own checks. Merged into the normalized findings.json and the COMPLETE report without forking autoqa. Invalid entries are dropped (warned), never fatal."
    default: ""

outputs:
  report-path:
    description: "Directory containing all reports"
    value: "/tmp/qa-reports"
  complete-report-md:
    description: "Path to the always-on human-readable COMPLETE QA report"
    value: "/tmp/qa-reports/qa-report.md"
  findings-json:
    description: "Path to the normalized StandardFinding[] (machine-readable)"
    value: "/tmp/qa-reports/findings.json"
  pages-visited:
    description: "Number of pages crawled"
    value: ${{ steps.crawler.outputs.pages-visited }}
  js-errors:
    description: "Number of JS errors found"
    value: ${{ steps.crawler.outputs.js-errors }}
  axe-violations:
    description: "Number of accessibility violations found"
    value: ${{ steps.crawler.outputs.axe-violations }}
  broken-links:
    description: "Number of broken links found"
    value: ${{ steps.crawler.outputs.broken-links }}
  csp-violations:
    description: "Number of CSP violations captured"
    value: ${{ steps.crawler.outputs.csp-violations }}
  mixed-content:
    description: "Number of mixed-content requests captured"
    value: ${{ steps.crawler.outputs.mixed-content }}
  monkey-actions:
    description: "Number of monkey actions performed"
    value: ${{ steps.monkey.outputs.monkey-actions }}
  monkey-serious:
    description: "Number of serious monkey findings (crashes / uncaught errors / 5xx)"
    value: ${{ steps.monkey.outputs.monkey-serious }}

runs:
  using: "composite"
  steps:
    - name: Create reports directory
      shell: bash
      run: mkdir -p /tmp/qa-reports /tmp/qa-reports/baseline /tmp/qa-reports/screenshots

    - name: Restore crawler baseline
      id: baseline-restore
      if: inputs.crawler-enabled == 'true' && inputs.baseline-enabled == 'true'
      uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
      with:
        path: /tmp/qa-reports/baseline
        key: autoqa-baseline-${{ github.repository }}-${{ github.event.pull_request.base.ref || github.ref_name }}-${{ github.sha }}
        restore-keys: |
          autoqa-baseline-${{ github.repository }}-${{ github.event.pull_request.base.ref || github.ref_name }}-
          autoqa-baseline-${{ github.repository }}-main-
          autoqa-baseline-${{ github.repository }}-master-

    - name: Restore findings log (warehouse history)
      uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
      with:
        path: /tmp/qa-reports/findings-log-store
        key: autoqa-findings-log-${{ github.repository }}-${{ github.run_id }}
        restore-keys: |
          autoqa-findings-log-${{ github.repository }}-

    - name: Setup Node.js (for Playwright auth)
      if: inputs.auth-url != '' && inputs.auth-mode == 'playwright'
      uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
      with:
        node-version: "22"

    - name: Install Playwright (for Playwright auth)
      if: inputs.auth-url != '' && inputs.auth-mode == 'playwright'
      shell: bash
      run: |
        cd ${{ github.action_path }}/scripts
        npm init -y >/dev/null 2>&1 || true
        npm install --no-save playwright@1
        npx playwright install --with-deps chromium

    - name: Obtain auth token (curl)
      if: inputs.auth-url != '' && inputs.auth-mode != 'playwright'
      shell: bash
      continue-on-error: true
      run: bash ${{ github.action_path }}/scripts/auth.sh
      env:
        QA_BASE_URL: ${{ inputs.url }}
        QA_AUTH_PATH: ${{ inputs.auth-url }}
        QA_AUTH_BODY: ${{ inputs.auth-body }}

    - name: Obtain auth token (Playwright)
      if: inputs.auth-url != '' && inputs.auth-mode == 'playwright'
      shell: bash
      continue-on-error: true
      run: |
        cd ${{ github.action_path }}/scripts
        node auth-playwright.mjs
      env:
        QA_BASE_URL: ${{ inputs.url }}
        QA_AUTH_API_PATH: ${{ inputs.auth-url }}
        QA_AUTH_BODY: ${{ inputs.auth-body }}
        QA_AUTH_LOGIN_PAGE: ${{ inputs.auth-login-page != '' && inputs.auth-login-page || inputs.crawler-login-url }}
        QA_AUTH_SELECTOR_USERNAME: ${{ inputs.crawler-login-selector-username }}
        QA_AUTH_SELECTOR_PASSWORD: ${{ inputs.crawler-login-selector-password }}
        QA_AUTH_SELECTOR_SUBMIT: ${{ inputs.crawler-login-selector-submit }}
        QA_REPORTS_DIR: /tmp/qa-reports

    - name: Install Schemathesis
      if: always() && inputs.schemathesis-enabled == 'true'
      shell: bash
      run: pip install schemathesis

    - name: Schemathesis API fuzzing
      if: always() && inputs.schemathesis-enabled == 'true'
      shell: bash
      continue-on-error: true
      run: bash ${{ github.action_path }}/scripts/run-schemathesis.sh
      env:
        QA_BASE_URL: ${{ inputs.url }}
        QA_SCHEMATHESIS_BASE_URL: ${{ inputs.schemathesis-base-url }}
        QA_OPENAPI_URL: ${{ inputs.openapi-url }}
        QA_SCHEMATHESIS_EXCLUDE_PATHS: ${{ inputs.schemathesis-exclude-paths }}
        QA_SCHEMATHESIS_EXCLUDE_CHECKS: ${{ inputs.schemathesis-exclude-checks }}
        QA_HTTP_BASIC_USERNAME: ${{ inputs.http-basic-username }}
        QA_HTTP_BASIC_PASSWORD: ${{ inputs.http-basic-password }}

    - name: ZAP security scan
      if: always() && inputs.zap-enabled == 'true'
      shell: bash
      continue-on-error: true
      run: bash ${{ github.action_path }}/scripts/run-zap.sh
      env:
        QA_BASE_URL: ${{ inputs.url }}
        QA_SCHEMATHESIS_BASE_URL: ${{ inputs.schemathesis-base-url }}

    - name: Mozilla HTTP Observatory scan
      if: always() && inputs.observatory-enabled == 'true'
      shell: bash
      continue-on-error: true
      run: bash ${{ github.action_path }}/scripts/run-observatory.sh
      env:
        QA_BASE_URL: ${{ inputs.url }}
        QA_OBSERVATORY_ENABLED: ${{ inputs.observatory-enabled }}
        QA_OBSERVATORY_FAIL_GRADE: ${{ inputs.observatory-fail-grade }}

    - name: Setup Node.js
      if: always() && (inputs.crawler-enabled == 'true' || inputs.authz-enabled == 'true' || inputs.argos-enabled == 'true' || inputs.monkey-enabled == 'true')
      uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
      with:
        node-version: "22"

    - name: Install crawler dependencies
      if: always() && (inputs.crawler-enabled == 'true' || inputs.monkey-enabled == 'true')
      shell: bash
      continue-on-error: true
      run: cd ${{ github.action_path }}/tools/crawler && npm ci && npx playwright install chromium

    - name: Run crawler
      id: crawler
      if: always() && inputs.crawler-enabled == 'true'
      shell: bash
      continue-on-error: true
      run: node ${{ github.action_path }}/tools/crawler/crawl.js 2>&1 | tee /tmp/qa-reports/crawler.txt
      env:
        CRAWL_URL: ${{ inputs.url }}
        CRAWL_USERNAME: ${{ inputs.crawler-username }}
        CRAWL_PASSWORD: ${{ inputs.crawler-password }}
        CRAWL_HTTP_BASIC_USERNAME: ${{ inputs.http-basic-username }}
        CRAWL_HTTP_BASIC_PASSWORD: ${{ inputs.http-basic-password }}
        CRAWL_LOGIN_URL: ${{ inputs.crawler-login-url }}
        CRAWL_LOGIN_SELECTOR_USERNAME: ${{ inputs.crawler-login-selector-username }}
        CRAWL_LOGIN_SELECTOR_PASSWORD: ${{ inputs.crawler-login-selector-password }}
        CRAWL_LOGIN_SELECTOR_SUBMIT: ${{ inputs.crawler-login-selector-submit }}
        CRAWL_SEED_PAGES: ${{ inputs.crawler-seed-pages }}
        CRAWL_MAX_PAGES: ${{ inputs.crawler-max-pages }}
        CRAWL_WAIT_MS: ${{ inputs.crawler-wait-ms }}
        CRAWL_EXCLUDE_URLS: ${{ inputs.crawler-exclude-urls }}
        CRAWL_CONSOLE_IGNORE: ${{ inputs.crawler-console-ignore }}
        CRAWL_FAIL_ON_VIOLATIONS: ${{ inputs.baseline-enabled == 'true' && 'false' || 'true' }}
        CRAWL_ARGOS_ENABLED: ${{ inputs.argos-enabled }}
        CRAWL_FINDINGS_PATH: /tmp/qa-reports/crawler-findings.json
        CRAWL_PAGES_PATH: /tmp/qa-reports/crawler-pages.json
        CRAWL_SCREENSHOT_DIR: /tmp/qa-reports/screenshots

    - name: Mechanical property checks (M1–M6)
      if: always() && inputs.crawler-enabled == 'true'
      shell: bash
      continue-on-error: true
      run: node ${{ github.action_path }}/scripts/mechanical-checks.mjs 2>&1 | tee /tmp/qa-reports/mechanical-checks.txt
      env:
        QA_PAGES_PATH: /tmp/qa-reports/crawler-pages.json
        QA_MECHANICAL_OUTPUT: /tmp/qa-reports/mechanical-findings.json

    - name: Crawler baseline diff
      if: always() && inputs.crawler-enabled == 'true' && inputs.baseline-enabled == 'true'
      shell: bash
      continue-on-error: true
      run: node ${{ github.action_path }}/scripts/baseline-diff.mjs
      env:
        CRAWL_FINDINGS_PATH: /tmp/qa-reports/crawler-findings.json
        QA_BASELINE_DIR: /tmp/qa-reports/baseline

    - name: Save crawler baseline
      # schedule/workflow_dispatch consumers (nightly post-deploy QA) update the
      # baseline too — push-only saving left them on a permanent "first run".
      # The run_id suffix keeps the key reservable when the SHA repeats
      # (nightly cron on an unchanged main); restore picks the newest prefix match.
      if: inputs.crawler-enabled == 'true' && inputs.baseline-enabled == 'true' && (github.event_name == 'push' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch') && (github.ref_name == 'main' || github.ref_name == 'master')
      uses: actions/cache/save@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
      with:
        path: /tmp/qa-reports/baseline
        key: autoqa-baseline-${{ github.repository }}-${{ github.ref_name }}-${{ github.sha }}-${{ github.run_id }}

    - name: Upload screenshots to Argos
      if: inputs.crawler-enabled == 'true' && inputs.argos-enabled == 'true'
      shell: bash
      run: |
        if [ -z "${ARGOS_TOKEN}" ]; then
          echo "Skipping Argos upload — argos-enabled=true but argos-token is empty"
          exit 0
        fi
        npx --yes @argos-ci/cli@latest upload /tmp/qa-reports/screenshots
      env:
        ARGOS_TOKEN: ${{ inputs.argos-token }}

    - name: AuthZ two-token matrix
      if: always() && inputs.authz-enabled == 'true'
      shell: bash
      continue-on-error: true
      run: node ${{ github.action_path }}/scripts/run-authz-matrix.mjs
      env:
        QA_BASE_URL: ${{ inputs.url }}
        QA_AUTH_PATH: ${{ inputs.auth-url }}
        QA_AUTHZ_ENABLED: ${{ inputs.authz-enabled }}
        QA_AUTHZ_USER_A_BODY: ${{ inputs.authz-user-a-body }}
        QA_AUTHZ_USER_B_BODY: ${{ inputs.authz-user-b-body }}
        QA_AUTHZ_RESOURCE_PATHS: ${{ inputs.authz-resource-paths }}

    - name: Monkey chaos UI test
      id: monkey
      if: always() && inputs.monkey-enabled == 'true'
      shell: bash
      continue-on-error: true
      run: node ${{ github.action_path }}/tools/crawler/monkey.js 2>&1 | tee /tmp/qa-reports/monkey.txt
      env:
        MONKEY_URL: ${{ inputs.url }}
        MONKEY_USERNAME: ${{ inputs.crawler-username }}
        MONKEY_PASSWORD: ${{ inputs.crawler-password }}
        MONKEY_HTTP_BASIC_USERNAME: ${{ inputs.http-basic-username }}
        MONKEY_HTTP_BASIC_PASSWORD: ${{ inputs.http-basic-password }}
        MONKEY_LOGIN_URL: ${{ inputs.crawler-login-url }}
        MONKEY_LOGIN_SELECTOR_USERNAME: ${{ inputs.crawler-login-selector-username }}
        MONKEY_LOGIN_SELECTOR_PASSWORD: ${{ inputs.crawler-login-selector-password }}
        MONKEY_LOGIN_SELECTOR_SUBMIT: ${{ inputs.crawler-login-selector-submit }}
        MONKEY_SEED_PAGES: ${{ inputs.monkey-seed-pages }}
        MONKEY_DURATION_MS: ${{ inputs.monkey-duration-ms }}
        MONKEY_SEED: ${{ inputs.monkey-seed }}
        MONKEY_AVOID_TEXT: ${{ inputs.monkey-avoid-text }}
        MONKEY_EXCLUDE_URLS: ${{ inputs.monkey-exclude-urls }}
        MONKEY_CONSOLE_IGNORE: ${{ inputs.monkey-console-ignore != '' && inputs.monkey-console-ignore || inputs.crawler-console-ignore }}
        MONKEY_FAIL_ON_VIOLATIONS: ${{ inputs.monkey-fail-on-violations }}
        MONKEY_FINDINGS_PATH: /tmp/qa-reports/monkey-findings.json

    - name: Normalize findings (StandardFinding backbone)
      if: always()
      shell: bash
      continue-on-error: true
      run: node ${{ github.action_path }}/scripts/normalize-findings.mjs
      env:
        QA_REPORTS_DIR: /tmp/qa-reports
        QA_EXTRA_FINDINGS: ${{ inputs.extra-findings-path }}

    - name: Generate COMPLETE QA report
      if: always()
      shell: bash
      continue-on-error: true
      run: node ${{ github.action_path }}/scripts/generate-qa-report.mjs
      env:
        QA_REPORTS_DIR: /tmp/qa-reports
        QA_URL: ${{ inputs.url }}
        COMMIT_SHA: ${{ github.sha }}

    - name: Upload QA reports
      if: always()
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: autoqa-reports
        path: /tmp/qa-reports/
        retention-days: 7
        if-no-files-found: ignore

    - name: Aggregate findings and gate
      if: always()
      shell: bash
      run: node ${{ github.action_path }}/scripts/aggregate-gate.mjs
      env:
        QA_REPORTS_DIR: /tmp/qa-reports
        QA_GATE_CRAWLER_ENABLED: ${{ inputs.crawler-enabled }}
        QA_GATE_BASELINE_ENABLED: ${{ inputs.baseline-enabled }}
        QA_GATE_SCHEMATHESIS_ENABLED: ${{ inputs.schemathesis-enabled }}
        QA_GATE_ZAP_ENABLED: ${{ inputs.zap-enabled }}
        QA_GATE_MECHANICAL_ENABLED: ${{ inputs.crawler-enabled }}
        QA_GATE_OBSERVATORY_ENABLED: ${{ inputs.observatory-enabled }}
        QA_GATE_AUTHZ_ENABLED: ${{ inputs.authz-enabled }}
        QA_GATE_CRAWLER_FAIL: ${{ inputs.baseline-enabled == 'true' && 'true' || inputs.crawler-fail-on-violations }}
        QA_GATE_BASELINE_FAIL_ON_NEW: ${{ inputs.baseline-fail-on-new }}
        QA_GATE_CRAWLER_DECORATIVE_PATHS: ${{ inputs.crawler-decorative-paths }}
        QA_GATE_SCHEMATHESIS_FAIL: ${{ inputs.schemathesis-fail-on-violations }}
        QA_GATE_ZAP_FAIL: ${{ inputs.zap-fail-on-violations }}
        QA_GATE_ZAP_RATE_LIMITED_PATHS: ${{ inputs.zap-rate-limited-paths }}
        QA_GATE_MECHANICAL_FAIL: ${{ inputs.mechanical-fail-on-violations }}
        QA_GATE_OBSERVATORY_FAIL: ${{ inputs.observatory-fail-on-violations }}
        QA_GATE_AUTHZ_FAIL: ${{ inputs.authz-fail-on-violations }}
        QA_GATE_MONKEY_ENABLED: ${{ inputs.monkey-enabled }}
        QA_GATE_MONKEY_FAIL: ${{ inputs.monkey-fail-on-violations }}
        QA_OBSERVATORY_FAIL_GRADE: ${{ inputs.observatory-fail-grade }}
        QA_URL: ${{ inputs.url }}
        QA_FINDINGS_LOG_DIR: /tmp/qa-reports/findings-log-store

    # Runs AFTER the gate (if: always) so the row appended for THIS run is
    # included; the run_id-suffixed key stays reservable on SHA repeats, and
    # restore picks the newest prefix match (same pattern as the baseline).
    - name: Save findings log (warehouse history)
      if: always()
      uses: actions/cache/save@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
      with:
        path: /tmp/qa-reports/findings-log-store
        key: autoqa-findings-log-${{ github.repository }}-${{ github.run_id }}
